  const frame = document.getElementById('appFrame');
  const loading = document.getElementById('loading');
  const loadingText = document.getElementById('loadingText');
  let renderedMode = '';
  let lastPref = '';

  function decodeBase64Utf8(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i += 1) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  const htmlCache = {
    mobile: decodeBase64Utf8(MOBILE_B64),
    desktop: decodeBase64Utf8(DESKTOP_B64)
  };

  function readSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : {};
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (e) { return {}; }
  }
  function writeSettingsPatch(patch) {
    try {
      const next = Object.assign({}, readSettings(), patch || {});
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      return next;
    } catch (e) { return readSettings(); }
  }
  function getUrlView() {
    const v = new URLSearchParams(location.search).get('view');
    return v === 'mobile' || v === 'desktop' || v === 'auto' ? v : '';
  }
  function setUrlView(mode) {
    const u = new URL(location.href);
    if (!mode || mode === 'auto') u.searchParams.delete('view');
    else u.searchParams.set('view', mode);
    history.replaceState(null, '', u.toString());
  }
  function getPreferredViewMode() {
    const urlMode = getUrlView();
    if (urlMode) return urlMode;
    const s = readSettings();
    return s.viewMode === 'mobile' || s.viewMode === 'desktop' || s.viewMode === 'auto' ? s.viewMode : 'auto';
  }
  function resolveMode(pref) {
    if (pref === 'mobile' || pref === 'desktop') return pref;
    return window.matchMedia('(max-width: 860px)').matches ? 'mobile' : 'desktop';
  }
  function syncInitialStorageFromUrl() {
    const urlMode = getUrlView();
    if (urlMode) writeSettingsPatch({ viewMode: urlMode });
  }
  function showLoading(mode) {
    loadingText.textContent = 'Loading ' + (mode === 'mobile' ? 'mobile' : 'desktop') + ' view…';
    loading.classList.remove('hidden');
  }
  function render(force) {
    const pref = getPreferredViewMode();
    const mode = resolveMode(pref);
    if (!force && pref === lastPref && mode === renderedMode) return;
    lastPref = pref;
    renderedMode = mode;
    setUrlView(pref);
    showLoading(mode);
    frame.srcdoc = htmlCache[mode];
    document.documentElement.dataset.renderedMode = mode;
  }

  frame.addEventListener('load', () => loading.classList.add('hidden'));

  window.addEventListener('message', event => {
    if (event.source !== frame.contentWindow) return;
    const data = event.data || {};
    if (!data.mlqUnified || data.type !== 'view-change') return;
    const mode = data.mode === 'mobile' || data.mode === 'desktop' || data.mode === 'auto' ? data.mode : 'auto';
    writeSettingsPatch({ viewMode: mode });
    setUrlView(mode);
    render(true);
  });

  window.addEventListener('resize', () => {
    if (getPreferredViewMode() === 'auto') render(false);
  });

  window.addEventListener('popstate', () => {
    syncInitialStorageFromUrl();
    render(true);
  });

  let pollTimer = null;
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => {
      const pref = getPreferredViewMode();
      const mode = resolveMode(pref);
      if (pref !== lastPref || mode !== renderedMode) render(false);
    }, 300);
  }

  syncInitialStorageFromUrl();
  render(true);
  startPolling();
})();
